<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voir cet article sur Vinted</title>

    <!-- Open Graph -->
    <meta property="og:title" content="Voir cet article sur Vinted">
    <meta property="og:description" content="Appuyez pour ouvrir directement dans l'app Vinted">
    <meta property="og:image" content="https://marketplace-web-assets.vinted.com/_next/static/media/meta-preview-image.6ec43970.jpg">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Vinted Links">

    <!-- Twitter / WhatsApp -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Voir cet article sur Vinted">
    <meta name="twitter:description" content="Appuyez pour ouvrir directement dans l'app Vinted">
    <meta name="twitter:image" content="https://marketplace-web-assets.vinted.com/_next/static/media/meta-preview-image.6ec43970.jpg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 28px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
        }
        h1 { font-size: 20px; color: #222; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #666; margin-bottom: 24px; line-height: 1.5; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 12px;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.8; }
        .btn-primary { background: #09B1BA; color: #fff; }
        .btn-secondary { background: #e8f8f8; color: #09B1BA; }
        .error { color: #d32f2f; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <!-- Error state -->
        <div id="error" class="hidden">
            <h1 class="error">Lien invalide</h1>
            <p class="subtitle">Aucun identifiant d'article trouvé dans l'URL.<br>Vérifiez le lien et réessayez.</p>
        </div>

        <!-- Buttons -->
        <div id="buttons" class="hidden">
            <h1>Voir cet article</h1>
            <p class="subtitle">Appuyez pour ouvrir dans l'app Vinted</p>
            <a id="btn-app" class="btn btn-primary" href="#">Ouvrir dans Vinted</a>
            <a id="btn-web" class="btn btn-secondary" href="#">Ouvrir sur le site web</a>
        </div>
    </div>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id');
            var tld = params.get('tld') || 'fr';

            if (!id || !/^\d+$/.test(id)) {
                document.getElementById('error').classList.remove('hidden');
                return;
            }

            var webUrl = 'https://www.vinted.' + tld + '/items/' + id;

            document.getElementById('btn-app').href = webUrl;
            document.getElementById('btn-web').href = webUrl;
            document.getElementById('buttons').classList.remove('hidden');
        })();
    </script>
</body>
</html>
